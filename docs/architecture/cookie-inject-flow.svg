<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="gOK" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gWarn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gDanger" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowBad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b91c1c"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Title -->
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Cookie 一键植入 · 端到端流程</text>
  <text x="700" y="68" text-anchor="middle" font-size="13" fill="#64748b">网页A 点击 → window.open 携带 payload → 目标站油猴脚本校验注入 → 自动登录</text>

  <!-- ============ 顶部三大主体 ============ -->
  <!-- 网页A -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="320" height="200" rx="14" fill="url(#gA)"/>
    <text x="220" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">① 网页 A（你的控制台）</text>
    <text x="220" y="158" text-anchor="middle" font-size="11" fill="#e0e7ff">panel.example.com</text>
    <rect x="80" y="175" width="280" height="110" rx="8" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)"/>
    <text x="100" y="198" font-size="12" fill="#fff">📦 已存账号列表</text>
    <text x="100" y="220" font-size="11" fill="#e0e7ff">  · X 主号  [一键登录 →]</text>
    <text x="100" y="240" font-size="11" fill="#e0e7ff">  · IG 工作号  [一键登录 →]</text>
    <text x="100" y="260" font-size="11" fill="#e0e7ff">  · ……</text>
    <text x="100" y="278" font-size="10" fill="#c7d2fe">点击 = 取出 cookie + 签名 + open</text>
  </g>

  <!-- 浏览器/URL -->
  <g filter="url(#shadow)">
    <rect x="540" y="100" width="320" height="200" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <text x="700" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">② 浏览器（新 Tab）</text>
    <text x="700" y="158" text-anchor="middle" font-size="11" fill="#64748b">window.open() 触发</text>
    <rect x="560" y="175" width="280" height="110" rx="8" fill="#0f172a"/>
    <text x="575" y="200" font-size="11" font-family="Monaco,monospace" fill="#94a3b8">URL:</text>
    <text x="575" y="220" font-size="11" font-family="Monaco,monospace" fill="#38bdf8">https://x.com/</text>
    <text x="575" y="238" font-size="11" font-family="Monaco,monospace" fill="#fbbf24">  #__ulinject=</text>
    <text x="575" y="256" font-size="10" font-family="Monaco,monospace" fill="#fcd34d">    eyJ2IjoxLCJjIjoi…</text>
    <text x="575" y="274" font-size="10" font-family="Monaco,monospace" fill="#a3e635">    ←base64(payload)</text>
  </g>

  <!-- 目标站 -->
  <g filter="url(#shadow)">
    <rect x="1020" y="100" width="320" height="200" rx="14" fill="url(#gT)"/>
    <text x="1180" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">③ 目标站（任意网站）</text>
    <text x="1180" y="158" text-anchor="middle" font-size="11" fill="#dbeafe">x.com / instagram.com / ...</text>
    <rect x="1040" y="175" width="280" height="110" rx="8" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)"/>
    <text x="1060" y="198" font-size="12" fill="#fff">⚙️ 油猴脚本 @run-at document-start</text>
    <text x="1060" y="222" font-size="11" fill="#dbeafe">  · 读取 location.hash</text>
    <text x="1060" y="242" font-size="11" fill="#dbeafe">  · 五重校验</text>
    <text x="1060" y="262" font-size="11" fill="#dbeafe">  · 清场 → 注入 → 重载</text>
    <text x="1060" y="278" font-size="10" fill="#bfdbfe">@match *://*/*  全站覆盖</text>
  </g>

  <!-- 主体之间的箭头 -->
  <line x1="385" y1="200" x2="535" y2="200" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="460" y="190" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">window.open</text>
  <text x="460" y="218" text-anchor="middle" font-size="10" fill="#64748b">携带签名 payload</text>

  <line x1="865" y1="200" x2="1015" y2="200" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="940" y="190" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">加载页面</text>
  <text x="940" y="218" text-anchor="middle" font-size="10" fill="#64748b">脚本启动</text>

  <!-- ============ Payload 结构 ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="335" width="320" height="200" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <text x="220" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">📦 Payload 结构</text>
    <rect x="80" y="378" width="280" height="142" rx="6" fill="#0f172a"/>
    <text x="92" y="400" font-size="11" font-family="Monaco,monospace" fill="#e2e8f0">{</text>
    <text x="100" y="418" font-size="11" font-family="Monaco,monospace" fill="#94a3b8">  v: 1,</text>
    <text x="100" y="434" font-size="11" font-family="Monaco,monospace" fill="#fbbf24">  cookies:</text>
    <text x="100" y="450" font-size="10" font-family="Monaco,monospace" fill="#fcd34d">    "auth_token=...; ct0=..."</text>
    <text x="100" y="466" font-size="11" font-family="Monaco,monospace" fill="#a3e635">  target: "x.com",</text>
    <text x="100" y="482" font-size="11" font-family="Monaco,monospace" fill="#f472b6">  exp: 1730000060,</text>
    <text x="100" y="498" font-size="11" font-family="Monaco,monospace" fill="#60a5fa">  nonce: "rnd_xxx",</text>
    <text x="100" y="514" font-size="11" font-family="Monaco,monospace" fill="#34d399">  sig: "HMAC..."</text>
    <text x="92" y="528" font-size="11" font-family="Monaco,monospace" fill="#e2e8f0">}</text>
  </g>

  <!-- ============ 五重校验 ============ -->
  <g filter="url(#shadow)">
    <rect x="420" y="335" width="560" height="200" rx="14" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
    <text x="700" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">🔒 五重安全校验（接收方 document-start）</text>

    <g transform="translate(440,378)">
      <rect width="100" height="60" rx="8" fill="#fff" stroke="#fbbf24"/>
      <text x="50" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">① HMAC</text>
      <text x="50" y="42" text-anchor="middle" font-size="10" fill="#78350f">签名对得上</text>
      <text x="50" y="55" text-anchor="middle" font-size="9" fill="#a16207">防伪造</text>
    </g>
    <g transform="translate(550,378)">
      <rect width="100" height="60" rx="8" fill="#fff" stroke="#fbbf24"/>
      <text x="50" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">② 时效</text>
      <text x="50" y="42" text-anchor="middle" font-size="10" fill="#78350f">exp 未过期</text>
      <text x="50" y="55" text-anchor="middle" font-size="9" fill="#a16207">防重放</text>
    </g>
    <g transform="translate(660,378)">
      <rect width="100" height="60" rx="8" fill="#fff" stroke="#fbbf24"/>
      <text x="50" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">③ 域名</text>
      <text x="50" y="42" text-anchor="middle" font-size="10" fill="#78350f">target = host</text>
      <text x="50" y="55" text-anchor="middle" font-size="9" fill="#a16207">防错域</text>
    </g>
    <g transform="translate(770,378)">
      <rect width="100" height="60" rx="8" fill="#fff" stroke="#fbbf24"/>
      <text x="50" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">④ Nonce</text>
      <text x="50" y="42" text-anchor="middle" font-size="10" fill="#78350f">未使用过</text>
      <text x="50" y="55" text-anchor="middle" font-size="9" fill="#a16207">防双花</text>
    </g>
    <g transform="translate(880,378)">
      <rect width="80" height="60" rx="8" fill="#fff" stroke="#fbbf24"/>
      <text x="40" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">⑤ Ref</text>
      <text x="40" y="42" text-anchor="middle" font-size="10" fill="#78350f">白名单</text>
      <text x="40" y="55" text-anchor="middle" font-size="9" fill="#a16207">防钓鱼</text>
    </g>

    <!-- 失败/成功分流 -->
    <g transform="translate(440,455)">
      <rect width="240" height="65" rx="8" fill="#fee2e2" stroke="#dc2626"/>
      <text x="120" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">❌ 任一失败</text>
      <text x="120" y="48" text-anchor="middle" font-size="10" fill="#7f1d1d">静默丢弃 + 清 hash + 正常加载</text>
    </g>
    <g transform="translate(720,455)">
      <rect width="240" height="65" rx="8" fill="#dcfce7" stroke="#059669"/>
      <text x="120" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">✅ 全部通过</text>
      <text x="120" y="48" text-anchor="middle" font-size="10" fill="#064e3b">弹用户确认 → 进入注入流水线</text>
    </g>
  </g>

  <!-- ============ 注入流水线 ============ -->
  <g filter="url(#shadow)">
    <rect x="1020" y="335" width="320" height="200" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="1180" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">⚡ 注入流水线</text>

    <g transform="translate(1040,378)">
      <rect width="280" height="28" rx="6" fill="#fff" stroke="#10b981"/>
      <text x="14" y="19" font-size="11" fill="#065f46"><tspan font-weight="700">1.</tspan> 清 hash · history.replaceState</text>
    </g>
    <g transform="translate(1040,410)">
      <rect width="280" height="28" rx="6" fill="#fff" stroke="#10b981"/>
      <text x="14" y="19" font-size="11" fill="#065f46"><tspan font-weight="700">2.</tspan> 清场 · cookies/storage/cache/SW/IDB</text>
    </g>
    <g transform="translate(1040,442)">
      <rect width="280" height="28" rx="6" fill="#fff" stroke="#10b981"/>
      <text x="14" y="19" font-size="11" fill="#065f46"><tspan font-weight="700">3.</tspan> 注入 · GM_cookie.set 每条</text>
    </g>
    <g transform="translate(1040,474)">
      <rect width="280" height="28" rx="6" fill="#fff" stroke="#10b981"/>
      <text x="14" y="19" font-size="11" fill="#065f46"><tspan font-weight="700">4.</tspan> 标记 nonce 已用 · GM_setValue</text>
    </g>
    <g transform="translate(1040,506)">
      <rect width="280" height="28" rx="6" fill="url(#gOK)"/>
      <text x="14" y="19" font-size="11" font-weight="700" fill="#fff"><tspan>5.</tspan> location.reload() → ✅ 已登录</text>
    </g>
  </g>

  <!-- 中间连线 payload→校验→流水线 -->
  <line x1="385" y1="435" x2="415" y2="435" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="985" y1="435" x2="1015" y2="435" stroke="#059669" stroke-width="2" marker-end="url(#arrowOk)"/>

  <!-- ============ 关键时机/坑位 ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="575" width="640" height="285" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <text x="380" y="603" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">⏱ 关键时机 · 为什么必须 document-start</text>

    <!-- 时间轴 -->
    <line x1="100" y1="650" x2="660" y2="650" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="140" cy="650" r="8" fill="#ef4444"/>
    <circle cx="290" cy="650" r="8" fill="#f59e0b"/>
    <circle cx="440" cy="650" r="8" fill="#3b82f6"/>
    <circle cx="610" cy="650" r="8" fill="#10b981"/>

    <text x="140" y="635" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">document-start</text>
    <text x="140" y="675" text-anchor="middle" font-size="10" fill="#475569">★ 我们的时机</text>
    <text x="140" y="690" text-anchor="middle" font-size="9" fill="#64748b">DOM 还没建</text>

    <text x="290" y="635" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">document-end</text>
    <text x="290" y="675" text-anchor="middle" font-size="10" fill="#475569">DOM 完成</text>
    <text x="290" y="690" text-anchor="middle" font-size="9" fill="#64748b">首屏请求已发</text>

    <text x="440" y="635" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">document-idle</text>
    <text x="440" y="675" text-anchor="middle" font-size="10" fill="#475569">原脚本时机</text>
    <text x="440" y="690" text-anchor="middle" font-size="9" fill="#64748b">用户态已建立</text>

    <text x="610" y="635" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">SPA 路由</text>
    <text x="610" y="675" text-anchor="middle" font-size="10" fill="#475569">运行中</text>
    <text x="610" y="690" text-anchor="middle" font-size="9" fill="#64748b">内存里全是旧态</text>

    <!-- 说明 -->
    <rect x="80" y="715" width="600" height="130" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="100" y="738" font-size="12" font-weight="700" fill="#991b1b">⚠️ 如果在 idle 才注入：</text>
    <text x="100" y="758" font-size="11" fill="#7f1d1d">  • 首屏 API 已用旧 cookie 发完，页面渲染成"未登录"</text>
    <text x="100" y="776" font-size="11" fill="#7f1d1d">  • SPA 内存里缓存了旧 user state，cookie 改了也无效</text>
    <text x="100" y="794" font-size="11" fill="#7f1d1d">  • Service Worker 拦截请求并重新塞入旧 token</text>
    <text x="100" y="820" font-size="12" font-weight="700" fill="#065f46">✅ 解法：document-start 抢在网络请求之前清场+注入+ reload</text>
  </g>

  <!-- ============ 安全风险/缓解 ============ -->
  <g filter="url(#shadow)">
    <rect x="730" y="575" width="610" height="285" rx="14" fill="#fff" stroke="#cbd5e1"/>
    <text x="1035" y="603" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">🛡 攻击模型与缓解</text>

    <rect x="750" y="620" width="570" height="105" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="765" y="645" font-size="12" font-weight="700" fill="#991b1b">⚠ 会话固定攻击 (Session Fixation)</text>
    <text x="765" y="666" font-size="11" fill="#7f1d1d">钓鱼站放一个链接：</text>
    <text x="765" y="684" font-size="10" font-family="Monaco,monospace" fill="#b91c1c">  &lt;a href="https://x.com/#__ulinject=攻击者cookie"&gt;领奖&lt;/a&gt;</text>
    <text x="765" y="704" font-size="11" fill="#7f1d1d">用户点击 → 静默植入攻击者 cookie → 用户登入攻击者账号</text>
    <text x="765" y="720" font-size="11" fill="#7f1d1d">→ 用户发的私信/草稿/绑定信息全落到攻击者账户。</text>

    <rect x="750" y="740" width="570" height="105" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="765" y="765" font-size="12" font-weight="700" fill="#065f46">✅ 缓解措施（逐层削弱攻击面）</text>
    <text x="765" y="785" font-size="11" fill="#064e3b">  · HMAC 签名 + 共享 secret → 钓鱼站签不出有效 payload</text>
    <text x="765" y="803" font-size="11" fill="#064e3b">  · referrer 白名单 → 只允许从你的 A 站跳转</text>
    <text x="765" y="821" font-size="11" fill="#064e3b">  · 用户确认弹窗 → 最后一道人工闸</text>
    <text x="765" y="839" font-size="11" fill="#064e3b">  · nonce 一次性 + 60s 过期 → 即使被抓包也用不了第二次</text>
  </g>

  <!-- 底部页脚 -->
  <text x="700" y="888" text-anchor="middle" font-size="10" fill="#94a3b8">universal-login · cookie inject flow · 2026</text>
</svg>
